name: Python package tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Install the project
        run: just install
      - name: Lint with ruff
        run: just lint .
      - name: Format with ruff
        run: just fmt-check .
      - name: Test with unittest
        run: just test
      - name: Lint with ty
        run: just typecheck
      - name: Build
        run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl